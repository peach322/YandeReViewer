name: Android CI Build and Release

on:
  # 手动触发
  workflow_dispatch:

  # PR 创建 / 更新
  pull_request:
    types: [opened, synchronize, reopened]

  # 打 tag 发布
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. 拉代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. 解码签名（只有 release 才需要，但这里放着也没问题）
      - name: Decode and place keystore
        run: |
          echo "${{ secrets.SIGNING_KEY_STORE_BASE64 }}" | base64 --decode > $HOME/keystore.jks

      # 4. 版本号处理（tag / dev）
      - name: Update Version Name in gradle.properties
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION_NAME=${{ github.ref_name }}
            VERSION_NAME=${VERSION_NAME#v}
          else
            VERSION_NAME="dev-${{ github.run_number }}"
          fi

          echo "Updating appVersionName to $VERSION_NAME"
          sed -i "s/^appVersionName\s*=.*/appVersionName=$VERSION_NAME/" gradle.properties

      # 5. gradlew 权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. 构建（核心：PR=Debug，Tag=Release）
      - name: Build APK
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "🔧 Building RELEASE APK"
            export SIGNING_KEY_STORE_PATH="$HOME/keystore.jks"
            export SIGNING_STORE_PASSWORD="${{ secrets.SIGNING_STORE_PASSWORD }}"
            export SIGNING_KEY_ALIAS="${{ secrets.SIGNING_KEY_ALIAS }}"
            export SIGNING_KEY_PASSWORD="${{ secrets.SIGNING_KEY_PASSWORD }}"
            ./gradlew assembleRelease
          else
            echo "🧪 Building DEBUG APK"
            ./gradlew assembleDebug
          fi

      # 7. 上传 PR / 手动构建产物（Debug APK）
      - name: Upload Debug APK Artifact
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # 8. 生成 Release Notes（仅 tag）
      - name: Generate release notes
        if: github.ref_type == 'tag'
        id: generate_release_notes
        run: |
          CHANGELOG=$(git log -1 --pretty=format:"* %s (%h)" ${{ github.ref_name }})
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 9. 创建 Release + 上传 APK（仅 tag）
      - name: Create Release and Upload APK
        if: github.ref_type == 'tag'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "app/build/outputs/apk/release/app-release.apk"
          tag: ${{ github.ref_name }}
          body: ${{ steps.generate_release_notes.outputs.changelog }}
          token: ${{ secrets.GITHUB_TOKEN }}
