name: Android CI Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. keystore
      - name: Decode and place keystore
        run: |
          echo "${{ secrets.SIGNING_KEY_STORE_BASE64 }}" | base64 --decode > $HOME/keystore.jks

      # 4. version
      - name: Update Version Name in gradle.properties
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION_NAME=${{ github.ref_name }}
            VERSION_NAME=${VERSION_NAME#v}
          else
            VERSION_NAME="manual-${{ github.run_number }}"
          fi

          echo "Updating appVersionName to $VERSION_NAME"
          sed -i "s/^appVersionName\s*=.*/appVersionName=$VERSION_NAME/" gradle.properties

      # 5. gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. build
      - name: Build and sign Release APK
        run: |
          export SIGNING_KEY_STORE_PATH="$HOME/keystore.jks"
          export SIGNING_STORE_PASSWORD="${{ secrets.SIGNING_STORE_PASSWORD }}"
          export SIGNING_KEY_ALIAS="${{ secrets.SIGNING_KEY_ALIAS }}"
          export SIGNING_KEY_PASSWORD="${{ secrets.SIGNING_KEY_PASSWORD }}"
          ./gradlew assembleRelease

      # 7. upload artifact（手动 + tag 都能下载）
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      # 8. release notes（仅 tag）
      - name: Generate release notes
        if: github.ref_type == 'tag'
        id: generate_release_notes
        run: |
          CHANGELOG=$(git log -1 --pretty=format:"* %s (%h)" ${{ github.ref_name }})
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 9. GitHub Release（仅 tag）
      - name: Create Release and Upload APK
        if: github.ref_type == 'tag'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "app/build/outputs/apk/release/app-release.apk"
          tag: ${{ github.ref_name }}
          body: ${{ steps.generate_release_notes.outputs.changelog }}
          token: ${{ secrets.GITHUB_TOKEN }}
